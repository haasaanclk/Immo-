<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOMAINE — Estates</title>
  <script>try{var t=JSON.parse(localStorage.getItem("domaine.theme.v1"));document.documentElement.setAttribute("data-theme",t==="nocturne"?"nocturne":"day")}catch(e){document.documentElement.setAttribute("data-theme","day")}</script>
  <link rel="stylesheet" href="app.css" />
  <link rel="stylesheet" href="motion.css" />
</head>
<body>
  <main class="wrap">
    <section class="page-head">
      <p class="eyebrow">Selected Estates — 2014 / 2026</p>
      <h1 class="page-title" id="archiveTitle">The <em>Portfolio.</em></h1>
      <p class="page-sub">Bir kategori seçin; portföy o seçime göre süzülür. Her mülk için doğrulanmış bir <strong>Property DNA</strong>. Karşılaştırmak için <strong>Compare</strong>'e ekleyin, ilanınızı eklemek için <a class="btn--text" href="publish.html">Publish</a>.</p>
    </section>

    <div class="archive">
      <aside class="cat-rail">
        <div class="rail-head">Filter by Category</div>
        <ul id="catList"></ul>
      </aside>

      <div class="archive-main">
        <div class="archive-bar">
          <span id="resultCount" class="muted"></span>
          <div class="view-toggle">
            <button data-view="grid" class="on">Grid view <i>+</i></button>
            <button data-view="list">List view <i>+</i></button>
          </div>
        </div>
        <div id="results" class="results-grid"></div>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>
  <script src="store.js"></script>
  <script src="motion.js"></script>
  <script>
    DOMAINE.mountChrome("estates");
    const D = DOMAINE;
    const ALL = "All";
    const params = new URLSearchParams(location.search);
    let active = params.get("cat") || ALL;
    let view = "grid";

    const catListEl = document.getElementById("catList");
    const resultsEl = document.getElementById("results");
    const countEl = document.getElementById("resultCount");
    const crumb = document.querySelector(".page-head .eyebrow");
    const titleEl = document.getElementById("archiveTitle");

    function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1600); }
    function countFor(cat){ return D.getEstates().filter(e=>e.category===cat).length; }
    function listFor(cat){ const all=D.getEstates(); return cat===ALL?all:all.filter(e=>e.category===cat); }

    function renderCatList() {
      const total = D.getEstates().length;
      const cats = D.CATEGORIES;
      const rows = [`<li><a data-cat="${ALL}" class="cat ${active===ALL?'on':''}"><span>All Estates</span><sup>(${total})</sup></a></li>`]
        .concat(cats.map(c=>{
          const n = countFor(c);
          return `<li><a data-cat="${c}" class="cat ${active===c?'on':''} ${n===0?'empty':''}"><span>${c}</span><sup>(${n})</sup></a></li>`;
        }));
      catListEl.innerHTML = rows.join("");
      catListEl.querySelectorAll(".cat").forEach(a => a.onclick = () => select(a.dataset.cat));
    }

    function cardHTML(e){
      const dna = D.computeDNA(e);
      const fav = D.isSaved(e.id);
      const cmp = D.inCompare(e.id);
      return `<article class="card" data-id="${e.id}">
        <div class="card-media">
          <img src="${e.image}" alt="${e.title}" loading="lazy" onerror="this.src='public/image-1.png'"/>
          <span class="card-tag">${e.category}</span>
          <button class="card-fav ${fav?'on':''}" data-fav="${e.id}" title="Koleksiyona ekle">${fav?'✦':'✧'}</button>
          <button class="card-cmp ${cmp?'on':''}" data-cmp="${e.id}">${cmp?'✓ Compare':'+ Compare'}</button>
        </div>
        <div class="card-body"><div>
          <div class="card-cat">${e.city} · DNA ${dna.quality}</div>
          <div class="card-title">${e.title}</div>
          <div class="card-meta">${e.beds} yatak · ${D.area(e.m2)} · ${e.floors} kat</div>
        </div><div class="card-price">${D.money(e.price)}</div></div>
      </article>`;
    }
    function rowHTML(e,i){
      const dna = D.computeDNA(e);
      return `<a class="lrow" href="estate.html?id=${e.id}">
        <span class="lrow-i">${String(i+1).padStart(2,'0')}</span>
        <span class="lrow-title">${e.title}</span>
        <span class="lrow-cat">${e.category}</span>
        <span class="lrow-city">${e.city}</span>
        <span class="lrow-dna">DNA ${dna.quality}</span>
        <span class="lrow-price">${D.money(e.price)}</span>
      </a>`;
    }

    function wireCards(){
      resultsEl.querySelectorAll(".card").forEach(c => c.onclick = (ev)=>{ if(ev.target.closest("[data-fav]")||ev.target.closest("[data-cmp]")) return; location.href="estate.html?id="+c.dataset.id; });
      resultsEl.querySelectorAll("[data-fav]").forEach(b => b.onclick=(ev)=>{ ev.stopPropagation();
        const on=D.toggleSaved(b.dataset.fav); b.classList.toggle("on",on); b.textContent=on?"✦":"✧"; D.refreshCollectionCount();
        toast(on?"Koleksiyonunuza eklendi":"Koleksiyondan çıkarıldı"); });
      resultsEl.querySelectorAll("[data-cmp]").forEach(b => b.onclick=(ev)=>{ ev.stopPropagation();
        const r = D.toggleCompare(b.dataset.cmp);
        if (r.full) { toast("En fazla 3 mülk karşılaştırılabilir."); return; }
        b.classList.toggle("on", r.on); b.textContent = r.on?'✓ Compare':'+ Compare';
        renderTray(); });
    }

    function renderResults() {
      const list = listFor(active);
      countEl.textContent = `${list.length} ${active===ALL?'mülk':active.toLowerCase()}`;
      crumb.textContent = active===ALL ? "Selected Estates — 2014 / 2026" : `Estates / ${active}`;
      titleEl.innerHTML = active===ALL ? 'The <em>Portfolio.</em>' : `${active}<em>.</em>`;
      if (!list.length) {
        resultsEl.className = "results-empty";
        resultsEl.innerHTML = `<div class="notice">Bu kategoride henüz mülk yok.<br/><a class="btn--text" href="publish.html">İlk ilanı siz ekleyin →</a></div>`;
        return;
      }
      if (view==="grid") {
        resultsEl.className = "results-grid";
        resultsEl.innerHTML = list.map(cardHTML).join("");
        wireCards();
      } else {
        resultsEl.className = "results-list";
        resultsEl.innerHTML = `<div class="lrow lrow--head"><span class="lrow-i">№</span><span class="lrow-title">Mülk</span><span class="lrow-cat">Kategori</span><span class="lrow-city">Konum</span><span class="lrow-dna">Kalite</span><span class="lrow-price">Fiyat</span></div>` + list.map(rowHTML).join("");
      }
    }

    /* ---- compare tray ---- */
    let tray = document.createElement("div");
    tray.className = "compare-tray";
    document.body.appendChild(tray);
    function renderTray(){
      const ids = D.getCompare();
      const items = D.getEstates().filter(e=>ids.includes(e.id));
      if (!items.length){ tray.classList.remove("show"); return; }
      tray.innerHTML = `<span class="ct-label">Compare · ${items.length}/3</span>
        <div class="ct-chips">${items.map(e=>`<div class="ct-chip"><img src="${e.image}" onerror="this.src='public/image-1.png'"/><button data-x="${e.id}" title="Çıkar">✕</button></div>`).join("")}</div>
        <a class="btn" href="compare.html" style="padding:.7em 1.2em">Karşılaştır <i>→</i></a>`;
      tray.classList.add("show");
      tray.querySelectorAll("[data-x]").forEach(b=>b.onclick=()=>{ D.toggleCompare(b.dataset.x); renderResults(); renderTray(); });
    }

    function crossfade(fn){ resultsEl.style.opacity=0; setTimeout(()=>{ fn(); resultsEl.style.opacity=1; },200); }
    function select(cat){
      if (cat===active) return;
      active = cat; renderCatList();
      const url = cat===ALL ? "estates.html" : "estates.html?cat="+encodeURIComponent(cat);
      history.replaceState(null,"",url);
      crossfade(renderResults);
    }

    document.querySelectorAll(".view-toggle button").forEach(b => b.onclick = () => {
      if (b.dataset.view===view) return;
      view = b.dataset.view;
      document.querySelectorAll(".view-toggle button").forEach(x=>x.classList.toggle("on", x.dataset.view===view));
      crossfade(renderResults);
    });

    renderCatList(); renderResults(); renderTray();
  </script>
</body>
</html>
