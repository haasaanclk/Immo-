<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOMAINE — Estate Archive</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="loading-screen" id="loadingScreen" role="status" aria-label="Loading archive">
      <div class="loading-inner">
        <div class="loading-brand">DOMAINE<span>®</span></div>
        <div class="loading-text">Loading Archive</div>
        <div class="loading-bar"><span></span></div>
      </div>
    </div>

    <header class="site-header">
      <div class="header-left">
        <div class="brand">DOMAINE<span class="brand-dot">®</span></div>
        <nav class="nav">
          <a href="#" class="is-active">Archive</a>
          <a href="estates.html">Estates</a>
          <a href="concierge.html">Concierge</a>
          <a href="publish.html">Publish</a>
        </nav>
      </div>
      <div class="lang">
        <span>EN</span><span class="sep">/</span><span class="muted">DE</span>
      </div>
      <button class="menu-toggle" type="button" aria-label="Menu"><span></span><span></span></button>
    </header>

    <a class="corner corner--left" href="estates.html">Browse Estates <i>+</i></a>
    <a class="corner corner--right" href="concierge.html">Find my home <i>+</i></a>

    <div class="scene">
      <div class="gallery" id="gallery"></div>
      <div class="center" id="center">
        <div class="center-default" id="centerDefault">
          <p class="center-eyebrow">Selected Estates — 2014 / 2026</p>
          <h1 class="center-title">We are <em>DOMAINE.</em></h1>
          <p class="center-sub">A private AI real-estate concierge for the few.</p>
        </div>
        <div class="center-project" id="centerProject">
          <div class="preview-img" id="previewImg"><img src="public/image-1.png" alt="" /></div>
          <p class="preview-cat" id="previewCat">Villa</p>
          <h2 class="preview-title" id="previewTitle">Untitled</h2>
        </div>
      </div>
      <div class="labels" id="labels"></div>
    </div>

    <div class="mobile-preview" id="mobilePreview">
      <p class="mp-cat" id="mpCat">Villa</p>
      <h1 class="mp-title" id="mpTitle">Villa Helvetia</h1>
      <div class="mp-img" id="mpImg"><img src="public/image-1.png" alt="" /></div>
      <a class="mp-view" href="estates.html">View estate <i>+</i></a>
    </div>

    <div class="mobile-ring-hitbox" id="ringHitbox"></div>
    <div class="custom-cursor" id="cursor"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
