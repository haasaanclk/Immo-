<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOMAINE — Estate</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <main class="wrap" id="main"></main>
  <div class="toast" id="toast"></div>
  <script src="store.js"></script>
  <script>
    DOMAINE.mountChrome("estates");
    const id = new URLSearchParams(location.search).get("id");
    const e = DOMAINE.getEstate(id);
    const main = document.getElementById("main");
    function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1600); }

    if (!e) {
      main.innerHTML = `<section class="page-head"><h1 class="page-title">Mülk bulunamadı.</h1>
        <p class="page-sub"><a class="btn--text" href="estates.html">← Portföye dön</a></p></section>`;
    } else {
      const dna = DOMAINE.computeDNA(e);
      const imgs = (e.images && e.images.length) ? e.images : [e.image];
      const axisRows = Object.keys(DOMAINE.AXIS_LABELS).map(k =>
        `<div class="axis"><div class="axis-top"><span>${DOMAINE.AXIS_LABELS[k]}</span><span>${dna.axes[k]}</span></div>
         <div class="axis-bar"><span class="axis-fill" data-v="${dna.axes[k]}"></span></div></div>`).join("");

      main.innerHTML = `
      <section class="page-head" style="padding-bottom:1.4em">
        <p class="eyebrow"><a href="estates.html">Estates</a> · ${e.category} · ${e.city}</p>
        <h1 class="page-title" style="font-size:clamp(30px,4.4vw,54px)">${e.title}</h1>
        <p class="page-sub">${e.blurb || ""}</p>
      </section>
      <section class="detail">
        <div>
          <div class="gallery-main"><img id="hero" src="${imgs[0]}" alt="${e.title}" onerror="this.src='public/image-1.png'"/></div>
          <div class="thumbs">${imgs.map((s,i)=>`<img class="thumb ${i===0?'on':''}" data-i="${i}" src="${s}" onerror="this.src='public/image-1.png'"/>`).join("")}</div>
          <dl class="spec-list">
            <div class="spec"><dt>Fiyat</dt><dd>${DOMAINE.money(e.price)}</dd></div>
            <div class="spec"><dt>Kategori</dt><dd>${e.category}</dd></div>
            <div class="spec"><dt>Yaşam alanı</dt><dd>${DOMAINE.area(e.m2)}</dd></div>
            <div class="spec"><dt>Yatak odası</dt><dd>${e.beds}</dd></div>
            <div class="spec"><dt>Kat sayısı</dt><dd>${e.floors}</dd></div>
            <div class="spec"><dt>Çatı tipi</dt><dd>${e.roof || "—"}</dd></div>
            <div class="spec"><dt>İkametgah tipi</dt><dd>${e.residence || "—"}</dd></div>
            <div class="spec"><dt>İnşa yılı</dt><dd>${e.year || "—"}</dd></div>
            <div class="spec"><dt>Konum</dt><dd>${e.city}</dd></div>
            <div class="spec"><dt>Pasaport No</dt><dd>${dna.serial}</dd></div>
          </dl>
        </div>
        <aside>
          <div class="dna">
            <div class="dna-head">
              <div class="dna-q">${dna.quality}<small> /100</small></div>
              <div class="dna-serial">PROPERTY DNA<br/>${dna.serial}</div>
            </div>
            <p class="muted" style="font-size:13px;margin-top:.4em">Kalite Endeksi — mimari, malzeme, mahremiyet, lokasyon, prestij ve yatırım eksenlerinin ağırlıklı bileşimi.</p>
            <div class="dna-axes">${axisRows}</div>
          </div>
          <div style="display:flex; gap:.7em; margin-top:1.4em; flex-wrap:wrap">
            <button class="btn" id="viewBtn">Özel gösterim talep et <i>→</i></button>
            <button class="btn btn--ghost" id="saveBtn">${DOMAINE.isSaved(e.id)?'✦ Koleksiyonda':'✧ Koleksiyona ekle'}</button>
          </div>
          <p class="muted" style="font-size:12px;margin-top:1em">Talebinizde kimliğiniz gizli kalır — satıcıya yalnızca maskelenmiş finansal yeterlilik iletilir (Invisible Buyer).</p>
        </aside>
      </section>

      <section class="module">
        <div class="module-head"><p class="eyebrow">04 — Akıllı Finans</p><h2 class="module-title">Yatırım <em>zekâsı.</em></h2></div>
        <div class="finance">
          <div class="fin-controls">
            <div class="slider"><label>Peşinat <b id="downV">35%</b></label><input type="range" id="down" min="10" max="80" value="35"/></div>
            <div class="slider"><label>Vade <b id="termV">20 yıl</b></label><input type="range" id="term" min="5" max="30" value="20"/></div>
            <div class="slider"><label>Faiz <b id="rateV">3.4%</b></label><input type="range" id="rate" min="10" max="80" value="34"/></div>
            <p class="muted" style="font-size:12px;margin-top:.4em">Deterministik tahmin — bakım, enerji ve vergi dâhil toplam sahip olma maliyeti.</p>
          </div>
          <div class="fin-out" id="finOut"></div>
        </div>
        <div class="projection">
          <div class="proj-head"><span>10 yıllık değer projeksiyonu</span><span id="growth" class="muted"></span></div>
          <div class="proj-bars" id="projBars"></div>
        </div>
      </section>

      <section class="module">
        <div class="module-head"><p class="eyebrow">05 — Atelier</p><h2 class="module-title">AI iç mimar <em>stüdyosu.</em></h2></div>
        <p class="page-sub" style="margin-top:0">Bir tarz seçin; palet, malzeme, tahmini maliyet ve ev değerine etkisini anında görün.</p>
        <div class="atelier-chips" id="atelierChips"></div>
        <div class="atelier-result" id="atelierResult"></div>
      </section>`;

      requestAnimationFrame(() => main.querySelectorAll(".axis-fill").forEach(f => f.style.right = (100 - f.dataset.v) + "%"));

      /* ---- Finance ---- */
      const downEl = document.getElementById("down"), termEl = document.getElementById("term"), rateEl = document.getElementById("rate");
      function renderFinance() {
        const downPct = +downEl.value, termYears = +termEl.value, ratePct = +rateEl.value / 10;
        document.getElementById("downV").textContent = downPct + "%";
        document.getElementById("termV").textContent = termYears + " yıl";
        document.getElementById("rateV").textContent = ratePct.toFixed(1) + "%";
        const f = DOMAINE.finance(e, { downPct, termYears, ratePct });
        document.getElementById("finOut").innerHTML = `
          <div class="fin-big"><span class="muted">Aylık ödeme</span><strong>${DOMAINE.money(f.monthly)}</strong></div>
          <div class="fin-rows">
            <div><span>Kredi tutarı</span><b>${DOMAINE.money(f.loan)}</b></div>
            <div><span>Peşinat</span><b>${DOMAINE.money(f.down)}</b></div>
            <div><span>Aylık toplam (sahip olma)</span><b>${DOMAINE.money(f.monthlyAll)}</b></div>
            <div><span>Yıllık bakım · enerji · vergi</span><b>${DOMAINE.money(f.maintenance + f.energy + f.tax)}</b></div>
          </div>`;
        document.getElementById("growth").textContent = "yıllık ~%" + f.growthPct;
        const max = Math.max(...f.projection);
        document.getElementById("projBars").innerHTML = f.projection.map((v, y) =>
          `<div class="pbar"><span class="pbar-fill" style="height:${Math.round(v / max * 100)}%"></span><i>${y}</i></div>`).join("");
        requestAnimationFrame(() => document.querySelectorAll(".pbar-fill").forEach(b => b.style.transform = "scaleY(1)"));
      }
      [downEl, termEl, rateEl].forEach(el => el.addEventListener("input", renderFinance));
      renderFinance();

      /* ---- Atelier ---- */
      const chipsEl = document.getElementById("atelierChips");
      chipsEl.innerHTML = DOMAINE.ATELIER_STYLES.map((s, i) => `<button class="chip ${i === 0 ? 'on' : ''}" data-key="${s.key}">${s.name}</button>`).join("");
      function renderAtelier(key) {
        const a = DOMAINE.atelier(e, key);
        document.getElementById("atelierResult").innerHTML = `
          <div class="atl-palette">${a.style.palette.map(c => `<span style="background:${c}"></span>`).join("")}</div>
          <div class="atl-info">
            <h3>${a.style.name}</h3>
            <p class="atl-mat">${a.style.materials}</p>
            <p class="muted" style="font-size:13px">${a.style.note}</p>
            <div class="atl-stats">
              <div><span class="muted">Tahmini maliyet</span><b>${DOMAINE.money(a.cost)}</b></div>
              <div><span class="muted">Ev değerine etki</span><b class="pos">+%${a.impactPct} · ${DOMAINE.money(a.valueGain)}</b></div>
            </div>
          </div>`;
      }
      chipsEl.querySelectorAll(".chip").forEach(b => b.onclick = () => {
        chipsEl.querySelectorAll(".chip").forEach(x => x.classList.remove("on")); b.classList.add("on");
        renderAtelier(b.dataset.key);
      });
      renderAtelier(DOMAINE.ATELIER_STYLES[0].key);
      main.querySelectorAll(".thumb").forEach(t => t.onclick = () => {
        document.getElementById("hero").src = imgs[t.dataset.i];
        main.querySelectorAll(".thumb").forEach(x => x.classList.remove("on")); t.classList.add("on");
      });
      document.getElementById("saveBtn").onclick = (ev) => {
        const on = DOMAINE.toggleSaved(e.id);
        ev.target.textContent = on ? "✦ Koleksiyonda" : "✧ Koleksiyona ekle";
        toast(on ? "Koleksiyonunuza eklendi" : "Koleksiyondan çıkarıldı");
      };
      document.getElementById("viewBtn").onclick = () => toast("Özel gösterim talebiniz concierge ekibine iletildi.");
    }
  </script>
</body>
</html>
